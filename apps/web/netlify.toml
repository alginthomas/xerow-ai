[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = ""

[[redirects]]
  from = "/api/chat/*"
  to = "https://xerow-agent-production.up.railway.app/api/chat/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://xerow-ai-production.up.railway.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
